<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Industrial Supplier CRM</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f7fb;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

input,select{
    padding:10px;
    margin:5px;
}

button{
    padding:10px 15px;
    cursor:pointer;
}

.hidden{
    display:none;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

</style>

</head>

<body>

<div id="authCard" class="card">

<h2>Login / Signup</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<br>

<button onclick="signUp()">
Sign Up
</button>

<button onclick="signIn()">
Login
</button>

</div>

<div id="crmArea" class="hidden">

<div class="card">

<h2>Industrial CRM</h2>

<p id="userEmail"></p>

<button onclick="logout()">
Logout
</button>

</div>

<div class="card">

<h3>Add Lead</h3>

<input
id="company"
placeholder="Company">

<input
id="contact"
placeholder="Contact">

<input
id="phone"
placeholder="Phone">

<select id="stage">

<option>New Lead</option>
<option>Contacted</option>
<option>Quotation Sent</option>
<option>Won</option>
<option>Lost</option>

</select>

<button onclick="addLead()">
Save Lead
</button>

</div>

<div class="card">

<h3>Leads</h3>

<table>

<thead>

<tr>
<th>Company</th>
<th>Contact</th>
<th>Phone</th>
<th>Stage</th>
</tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

</div>

</div>

<script>

/**************************************************
SUPABASE
**************************************************/

const supabaseUrl =
"https://fakvnhividjbqvjkalty.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZha3ZuaGl2aWRqYnF2amthbHR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NzM3NDAsImV4cCI6MjA5ODE0OTc0MH0.-IEpWTktiHY-mBhPUHB70XKQST3syyUnD4t8YfyOXyg";

const supabaseClient =
window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

console.log("Supabase initialized");

/**************************************************
SIGNUP
**************************************************/

async function signUp(){

try{

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const { data,error } =
await supabaseClient.auth.signUp({
email,
password
});

if(error){

alert(error.message);
return;

}

if(data.user){

await supabaseClient
.from("profiles")
.upsert([
{
id:data.user.id,
email:data.user.email,
role:"user"
}
]);

}

alert(
"Signup successful"
);

}catch(err){

console.error(err);

alert(err.message);

}

}

/**************************************************
LOGIN
**************************************************/

async function signIn(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const { error } =
await supabaseClient
.auth
.signInWithPassword({

email,
password

});

if(error){

alert(error.message);
return;

}

checkSession();

}

/**************************************************
LOGOUT
**************************************************/

async function logout(){

await supabaseClient.auth.signOut();

location.reload();

}

/**************************************************
SESSION
**************************************************/

async function checkSession(){

const {
data:{session}
}
=
await supabaseClient
.auth
.getSession();

if(session){

document
.getElementById("authCard")
.classList
.add("hidden");

document
.getElementById("crmArea")
.classList
.remove("hidden");

document
.getElementById("userEmail")
.innerHTML =
session.user.email;

loadLeads();

}

}

/**************************************************
LOAD LEADS
**************************************************/

async function loadLeads(){

const {
data:{user}
}
=
await supabaseClient
.auth
.getUser();

const {
data,
error
}
=
await supabaseClient
.from("leads")
.select("*")
.eq("owner_id",user.id);

if(error){

console.error(error);
return;

}

render(data);

}

/**************************************************
RENDER
**************************************************/

function render(leads){

const tbody =
document.getElementById(
"tbody"
);

tbody.innerHTML = "";

leads.forEach(l=>{

tbody.innerHTML += `
<tr>
<td>${l.company||''}</td>
<td>${l.contact||''}</td>
<td>${l.phone||''}</td>
<td>${l.stage||''}</td>
</tr>
`;

});

}

/**************************************************
ADD LEAD
**************************************************/

async function addLead(){

const company =
document.getElementById(
"company"
).value;

const contact =
document.getElementById(
"contact"
).value;

const phone =
document.getElementById(
"phone"
).value;

const stage =
document.getElementById(
"stage"
).value;

const {
data:{user}
}
=
await supabaseClient
.auth
.getUser();

const { error }
=
await supabaseClient
.from("leads")
.insert([
{
company,
contact,
phone,
stage,
owner_id:user.id
}
]);

if(error){

alert(error.message);
return;

}

loadLeads();

}

/**************************************************
START
**************************************************/

checkSession();

</script>

</body>
</html>
