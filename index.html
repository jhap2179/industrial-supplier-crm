<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Industrial Supplier CRM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f7fb;
    margin:0;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

input,select{
    padding:10px;
    margin:5px;
    border:1px solid #ddd;
    border-radius:5px;
}

button{
    background:#4f46e5;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

.metric{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    width:250px;
}

.hidden{
    display:none;
}

.success{
    color:green;
}

.error{
    color:red;
}

</style>

</head>

<body>

<div class="container">

<!-- LOGIN -->

<div id="authCard" class="card">

<h2>Industrial CRM Login</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<br>

<button onclick="signUp()">
Sign Up
</button>

<button onclick="signIn()">
Login
</button>

<div id="authMessage"></div>

</div>

<!-- CRM -->

<div id="crmArea" class="hidden">

<div class="card">

<h2>Industrial Supplier CRM</h2>

<p id="loggedInUser"></p>

<button onclick="logout()">
Logout
</button>

</div>

<div class="metric">

<h3>Total Leads</h3>

<h1 id="leadCount">0</h1>

</div>

<br>

<div class="card">

<h3>Add Lead</h3>

<input
id="company"
placeholder="Company Name">

<input
id="contact"
placeholder="Contact Person">

<input
id="phone"
placeholder="Phone Number">

<select id="stage">

<option>New Lead</option>
<option>Contacted</option>
<option>Requirement Received</option>
<option>Quotation Sent</option>
<option>Negotiation</option>
<option>Won</option>
<option>Lost</option>

</select>

<br>

<button onclick="addLead()">
Save Lead
</button>

<div id="saveMessage"></div>

</div>

<div class="card">

<h3>Lead List</h3>

<table>

<thead>

<tr>
<th>ID</th>
<th>Company</th>
<th>Contact</th>
<th>Phone</th>
<th>Stage</th>
<th>Created</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

</div>

<script>

/************************************************
SUPABASE CONFIG
************************************************/

const supabaseUrl =
"https://fakvnhividjbqvjkalty.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZha3ZuaGl2aWRqYnF2amthbHR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NzM3NDAsImV4cCI6MjA5ODE0OTc0MH0.-IEpWTktiHY-mBhPUHB70XKQST3syyUnD4t8YfyOXyg";

const supabase =
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

let leads = [];

/************************************************
SIGNUP
************************************************/

async function signUp(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const { error } =
await supabase.auth.signUp({
email,
password
});

if(error){

document.getElementById(
"authMessage"
).innerHTML =
"<p class='error'>"+error.message+"</p>";

return;

}

document.getElementById(
"authMessage"
).innerHTML =
"<p class='success'>Account created. Check email.</p>";

}

/************************************************
LOGIN
************************************************/

async function signIn(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const { error } =
await supabase.auth.signInWithPassword({

email,
password

});

if(error){

document.getElementById(
"authMessage"
).innerHTML =
"<p class='error'>"+error.message+"</p>";

return;

}

checkAuth();

}

/************************************************
LOGOUT
************************************************/

async function logout(){

await supabase.auth.signOut();

location.reload();

}

/************************************************
AUTH CHECK
************************************************/

async function checkAuth(){

const {
data:{session}
} =
await supabase.auth.getSession();

if(session){

document.getElementById(
"authCard"
).style.display="none";

document.getElementById(
"crmArea"
).classList.remove("hidden");

document.getElementById(
"loggedInUser"
).innerHTML =
"Logged in as: " +
session.user.email;

loadLeads();

}else{

document.getElementById(
"authCard"
).style.display="block";

document.getElementById(
"crmArea"
).classList.add("hidden");

}

}

/************************************************
LOAD LEADS
************************************************/

async function loadLeads(){

const {
data:{user}
} =
await supabase.auth.getUser();

const {
data,
error
} =
await supabase
.from("leads")
.select("*")
.eq("owner_id",user.id)
.order("id",{
ascending:false
});

if(error){

console.error(error);
return;

}

leads = data || [];

render();

}

/************************************************
RENDER
************************************************/

function render(){

document.getElementById(
"leadCount"
).innerText =
leads.length;

const tbody =
document.getElementById(
"tbody"
);

tbody.innerHTML = "";

leads.forEach(lead=>{

tbody.innerHTML += `
<tr>
<td>${lead.id}</td>
<td>${lead.company}</td>
<td>${lead.contact}</td>
<td>${lead.phone}</td>
<td>${lead.stage}</td>
<td>${new Date(
lead.created_at
).toLocaleString()}</td>
</tr>
`;

});

}

/************************************************
ADD LEAD
************************************************/

async function addLead(){

const company =
document.getElementById(
"company"
).value;

const contact =
document.getElementById(
"contact"
).value;

const phone =
document.getElementById(
"phone"
).value;

const stage =
document.getElementById(
"stage"
).value;

const {
data:{user}
} =
await supabase.auth.getUser();

const { error } =
await supabase
.from("leads")
.insert([
{
company,
contact,
phone,
stage,
owner_id:user.id
}
]);

if(error){

document.getElementById(
"saveMessage"
).innerHTML =
"<p class='error'>"+
error.message+
"</p>";

return;

}

document.getElementById(
"saveMessage"
).innerHTML =
"<p class='success'>Lead Saved</p>";

document.getElementById(
"company"
).value="";

document.getElementById(
"contact"
).value="";

document.getElementById(
"phone"
).value="";

loadLeads();

}

/************************************************
START
************************************************/

checkAuth();

</script>

</body>
</html>
