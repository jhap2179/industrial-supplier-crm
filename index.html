<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Supplier CRM</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- LOGIN -->
    <div id="authSection" class="card">

        <h2>Industrial Supplier CRM</h2>

        <input
            type="email"
            id="email"
            placeholder="Email">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <div class="button-row">
            <button onclick="signUp()">Sign Up</button>
            <button onclick="signIn()">Login</button>
        </div>

    </div>

    <!-- MAIN APP -->
    <div id="appSection" class="hidden">

        <!-- HEADER -->
        <div class="header">

            <div>
                <h2>Industrial Supplier CRM</h2>
                <span id="loggedInUser"></span>
            </div>

            <button onclick="logout()">
                Logout
            </button>

        </div>

        <!-- TABS -->
        <div class="tabs">

            <button
                class="tab-button"
                onclick="showTab('dashboardTab')">

                Dashboard
            </button>

            <button
                class="tab-button"
                onclick="showTab('leadsTab')">

                Leads
            </button>

            <button
                id="usersTabButton"
                class="tab-button hidden"
                onclick="showTab('usersTab')">

                Users
            </button>

            <button
                id="teamTabButton"
                class="tab-button hidden"
                onclick="showTab('teamTab')">

                Team
            </button>

        </div>

        <!-- DASHBOARD -->
        <div
            id="dashboardTab"
            class="tab-content card">

            <h3>Dashboard</h3>

            <div class="stats-grid">

                <div class="stat-box">
                    <h4>Total Leads</h4>
                    <span id="totalLeads">0</span>
                </div>

                <div class="stat-box">
                    <h4>New Leads</h4>
                    <span id="newLeads">0</span>
                </div>

                <div class="stat-box">
                    <h4>Won Leads</h4>
                    <span id="wonLeads">0</span>
                </div>

                <div class="stat-box">
                    <h4>Lost Leads</h4>
                    <span id="lostLeads">0</span>
                </div>

            </div>

        </div>

        <!-- LEADS -->
        <div
            id="leadsTab"
            class="tab-content card hidden">

            <h3>Lead Management</h3>

            <div class="form-grid">

                <input
                    id="company"
                    placeholder="Company Name">

                <input
                    id="contact"
                    placeholder="Contact Person">

                <input
                    id="phone"
                    placeholder="Phone Number">

                <select id="stage">

                    <option value="New Lead">
                        New Lead
                    </option>

                    <option value="Contacted">
                        Contacted
                    </option>

                    <option value="Quotation Sent">
                        Quotation Sent
                    </option>

                    <option value="Won">
                        Won
                    </option>

                    <option value="Lost">
                        Lost
                    </option>

                </select>

                <select id="assignUser">
                    <option value="">
                        Assign User
                    </option>
                </select>

            </div>

            <button onclick="addLead()">
                Save Lead
            </button>

            <hr>

            <table>

                <thead>

                    <tr>

                        <th>Company</th>
                        <th>Contact</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Assigned To</th>
                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="leadsTableBody">

                </tbody>

            </table>

        </div>

        <!-- USERS -->
        <div
            id="usersTab"
            class="tab-content card hidden">

            <h3>User Management</h3>

            <table>

                <thead>

                    <tr>

                        <th>Email</th>
                        <th>Role</th>
                        <th>Manager</th>
                        <th>Save</th>

                    </tr>

                </thead>

                <tbody id="usersTableBody">

                </tbody>

            </table>

        </div>

        <!-- TEAM -->
        <div
            id="teamTab"
            class="tab-content card hidden">

            <h3>My Team</h3>

            <table>

                <thead>

                    <tr>

                        <th>Email</th>
                        <th>Role</th>

                    </tr>

                </thead>

                <tbody id="teamTableBody">

                </tbody>

            </table>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
